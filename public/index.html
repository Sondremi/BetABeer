<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f131a" />
    <title>BetABeer</title>
    <style>
      :root {
        --bg: #0f131a;
        --panel: #1a1d25;
        --text: #e5e7eb;
        --muted: #b0b0b0;
        --accent: #ffd700;
        --border: #333;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #1b2230 0%, var(--bg) 45%);
        min-height: 100vh;
      }

      main {
        width: min(920px, 100% - 2rem);
        margin: 0 auto;
        padding: 2rem 0 3rem;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.25rem;
        margin-top: 1rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        color: var(--accent);
        font-size: clamp(1.6rem, 4vw, 2.2rem);
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .links {
        display: grid;
        gap: 0.75rem;
        margin-top: 1rem;
      }

      a {
        color: var(--text);
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.85rem 1rem;
        display: block;
      }

      a.primary {
        border-color: #4d4126;
        background: #25201a;
        color: var(--accent);
      }

      a:hover {
        border-color: #6a5630;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BetABeer</h1>
      <p>Denne siden brukes for policy-sider og OAuth-verifikasjon.</p>

      <section class="card">
        <div class="links">
          <a class="primary" href="https://bet-a-beer.netlify.app">Gå til innlogging</a>
          <a href="/privacy">Privacy Policy</a>
          <a href="/terms">Terms of Service</a>
        </div>
      </section>
    </main>
  </body>
</html>
